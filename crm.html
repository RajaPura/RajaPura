<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raja Pura — CRM Clientes</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F0E8; --surface:#FFFFFF; --surface2:#FAF7F2; --surface3:#EDE8DE;
  --gold:#B8782A; --gold-light:#D4943E; --gold-dim:#C8A96E; --gold-pale:#F0E6CC;
  --dark:#1A1208; --dark2:#2C2010; --muted:#8A7A5A; --muted2:#C4B898;
  --cream:#F0E6D3; --text:#2C2010;
  --green:#4A7A4A; --red:#8A3A2A; --blue:#3A5A8A;
  --border:#DDD0B8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* HEADER */
.header{background:var(--dark);padding:0 24px;border-bottom:2px solid var(--gold);}
.header-inner{max-width:1100px;margin:0 auto;padding:20px 0 0;display:flex;justify-content:space-between;align-items:flex-end;}
.brand{display:flex;flex-direction:column;}
.brand-tag{font-size:9px;letter-spacing:5px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:4px;}
.brand-title{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--cream);font-weight:400;letter-spacing:1px;}
.header-actions{display:flex;gap:10px;padding-bottom:20px;}
.btn-primary{padding:10px 20px;background:var(--gold);border:none;border-radius:8px;color:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .2s;}
.btn-primary:hover{background:var(--gold-light);}
.btn-secondary{padding:10px 20px;background:transparent;border:1px solid var(--gold-dim);border-radius:8px;color:var(--gold-dim);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s;}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold);}
.tabs{display:flex;gap:0;padding-top:4px;}
.tab{padding:10px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.5px;transition:all .2s;}
.tab.active{border-bottom-color:var(--gold);color:var(--gold);}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:28px 24px 60px;}

/* SEARCH BAR */
.search-bar{display:flex;gap:12px;margin-bottom:24px;align-items:center;}
.search-input{flex:1;padding:12px 18px;background:white;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:var(--muted2);}
.filter-select{padding:12px 16px;background:white;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);outline:none;cursor:pointer;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat{background:white;border-radius:12px;padding:18px 20px;border:1px solid var(--border);}
.stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--dark);font-weight:600;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.discount-banner{background:linear-gradient(135deg,#B8782A,#D4943E);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.discount-banner-text{font-family:'Cormorant Garamond',serif;font-size:16px;color:white;}
.discount-banner-sub{font-size:11px;color:rgba(255,255,255,.8);}

/* CLIENT LIST */
.clients-header{display:grid;grid-template-columns:180px 130px 120px 1fr 100px 80px 80px;gap:12px;padding:10px 16px;background:var(--dark);border-radius:10px 10px 0 0;margin-bottom:0;}
.clients-header span{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-dim);font-weight:500;}
.clients-list{background:white;border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;}
.client-row{display:grid;grid-template-columns:180px 130px 120px 1fr 100px 80px 80px;gap:12px;padding:14px 16px;border-bottom:1px solid var(--surface3);align-items:center;cursor:pointer;transition:background .15s;}
.client-row:hover{background:var(--surface2);}
.client-row:last-child{border-bottom:none;}
.client-name{font-weight:600;font-size:14px;color:var(--dark);}
.client-phone{font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;}
.client-country{font-size:12px;}
.client-notes{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-total{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--gold);}
.client-buys{font-size:13px;color:var(--muted);text-align:center;}
.nivel-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:0.5px;}
.nivel-bronze{background:rgba(180,120,60,.12);color:#8A5A20;}
.nivel-prata{background:rgba(140,140,160,.12);color:#606080;}
.nivel-ouro{background:rgba(184,120,42,.12);color:var(--gold);}
.nivel-vip{background:rgba(140,60,100,.12);color:#7A3060;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:6px;}
.empty-sub{font-size:13px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,18,8,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal{background:white;border-radius:18px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(26,18,8,.3);}
.modal-header{padding:28px 28px 0;border-bottom:1px solid var(--border);padding-bottom:20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:white;z-index:2;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--dark);}
.modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.modal-body{padding:24px 28px;}
.form-section{margin-bottom:22px;}
.form-section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--gold-pale);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.form-input{padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--gold);}
.form-select{padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;cursor:pointer;}
.form-textarea{padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;resize:vertical;min-height:70px;transition:border-color .2s;}
.form-textarea:focus{border-color:var(--gold);}
.modal-footer{padding:20px 28px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:white;}
.btn-danger{padding:10px 20px;background:transparent;border:1px solid var(--red);border-radius:8px;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s;}
.btn-danger:hover{background:rgba(138,58,42,.08);}

/* COMPRAS */
.compras-section{margin-top:8px;}
.compra-item{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--border);position:relative;}
.compra-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.compra-num{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:600;}
.compra-delete{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:center;}
.compra-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.add-compra-btn{width:100%;padding:10px;border:1px dashed var(--gold-dim);border-radius:9px;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gold);transition:all .2s;margin-top:4px;}
.add-compra-btn:hover{background:var(--gold-pale);border-color:var(--gold);}

/* DETAIL VIEW */
.detail-header{background:var(--dark);border-radius:14px;padding:28px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start;}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--cream);margin-bottom:4px;}
.detail-phone{font-size:15px;color:var(--gold-dim);}
.detail-meta{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;}
.detail-meta-item{font-size:12px;color:var(--muted2);}
.detail-grid{display:grid;grid-template-columns:1fr 2fr;gap:20px;}
.detail-card{background:white;border-radius:12px;padding:20px;border:1px solid var(--border);}
.detail-card-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;font-weight:600;}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--surface3);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-row-label{color:var(--muted);}
.detail-row-value{font-weight:500;color:var(--dark);}
.compra-card{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--border);}
.compra-card-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.compra-canal{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:600;}
.compra-data{font-size:11px;color:var(--muted);}
.compra-desc{font-size:13px;color:var(--dark);margin-bottom:4px;}
.compra-valor{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);font-weight:600;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--cream);padding:12px 24px;border-radius:99px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--gold-dim);}
.toast.show{opacity:1;}

.back-btn{display:flex;align-items:center;gap:8px;padding:8px 0;background:transparent;border:none;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:16px;}

@media(max-width:768px){
  .clients-header{display:none;}
  .client-row{grid-template-columns:1fr auto;gap:8px;}
  .client-phone,.client-country,.client-notes,.client-buys{display:none;}
  .detail-grid{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr;}
  .compra-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div>
      <div class="brand-tag">Raja Pura · Gestão Interna</div>
      <div class="brand-title">CRM — Clientes</div>
      <div class="tabs" id="mainTabs">
        <button class="tab active" onclick="switchView('lista',this)">Clientes</button>
        <button class="tab" onclick="switchView('stats',this)">Estatísticas</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div id="crmConn" style="font-size:11px;color:#B8782A;padding-bottom:4px">● A ligar...</div><div class="header-actions">
      <button class="btn-secondary" onclick="exportCSV()">↓ Exportar</button>
      <button class="btn-primary" onclick="openNovoCliente()">+ Novo Cliente</button>
    </div>
  </div>
</div>

<div class="main">

  <!-- LISTA VIEW -->
  <div id="view-lista">
    <div class="stats" id="statsCards"></div>
    <div class="search-bar">
      <input class="search-input" id="searchInput" type="text" placeholder="Pesquisar por nome, telefone ou país..." oninput="renderLista()">
      <select class="filter-select" id="filterCanal" onchange="renderLista()">
        <option value="">Todos os canais</option>
        <option value="Loja Lagos">Loja Lagos</option>
        <option value="Loja Silves">Loja Silves</option>
        <option value="Online">Online</option>
        <option value="Instagram">Instagram</option>
        <option value="WhatsApp">WhatsApp</option>
      </select>
      <select class="filter-select" id="filterNivel" onchange="renderLista()">
        <option value="">Todos os níveis</option>
        <option value="Bronze">Bronze</option>
        <option value="Prata">Prata</option>
        <option value="Ouro">Ouro</option>
        <option value="VIP Raja">VIP Raja</option>
      </select>
    </div>
    <div class="clients-header">
      <span>Nome</span><span>Telefone</span><span>País</span>
      <span>Notas</span><span>Total Gasto</span><span>Compras</span><span>Nível</span>
    </div>
    <div class="clients-list" id="clientsList"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" style="display:none">
    <button class="back-btn" onclick="backToLista()">← Voltar à lista</button>
    <div id="detailContent"></div>
  </div>

  <!-- STATS VIEW -->
  <div id="view-stats" style="display:none">
    <div id="statsContent"></div>
  </div>

</div>

<!-- MODAL CLIENTE -->
<div id="clienteModal" class="modal-overlay" style="display:none" onclick="if(event.target.id=='clienteModal')closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Novo Cliente</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- CONTACTO -->
      <div class="form-section">
        <div class="form-section-title">Contacto</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Telefone *</label>
            <input class="form-input" id="fTelefone" type="tel" placeholder="+351 912 345 678">
          </div>
          <div class="form-group">
            <label class="form-label">Nome</label>
            <input class="form-input" id="fNome" type="text" placeholder="Nome do cliente">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="fEmail" type="email" placeholder="email@exemplo.com">
          </div>
          <div class="form-group">
            <label class="form-label">País</label>
            <select class="form-select" id="fPais">
              <option value="">Selecionar...</option>
              <option value="🇵🇹 Portugal">🇵🇹 Portugal</option>
              <option value="🇪🇸 Espanha">🇪🇸 Espanha</option>
              <option value="🇬🇧 Reino Unido">🇬🇧 Reino Unido</option>
              <option value="🇫🇷 França">🇫🇷 França</option>
              <option value="🇩🇪 Alemanha">🇩🇪 Alemanha</option>
              <option value="🇳🇱 Holanda">🇳🇱 Holanda</option>
              <option value="🇧🇪 Bélgica">🇧🇪 Bélgica</option>
              <option value="🇨🇭 Suíça">🇨🇭 Suíça</option>
              <option value="🇮🇪 Irlanda">🇮🇪 Irlanda</option>
              <option value="🇺🇸 EUA">🇺🇸 EUA</option>
              <option value="🇧🇷 Brasil">🇧🇷 Brasil</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
        </div>
      </div>
      <!-- PERFIL -->
      <div class="form-section">
        <div class="form-section-title">Perfil</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Canal de Origem</label>
            <select class="form-select" id="fCanal">
              <option value="">Selecionar...</option>
              <option value="Loja Lagos">Loja Lagos</option>
              <option value="Loja Silves">Loja Silves</option>
              <option value="Online">Online</option>
              <option value="Instagram">Instagram</option>
              <option value="WhatsApp">WhatsApp</option>
              <option value="Feira/Evento">Feira/Evento</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Nível Fidelização</label>
            <select class="form-select" id="fNivel">
              <option value="Bronze">Bronze</option>
              <option value="Prata">Prata</option>
              <option value="Ouro">Ouro</option>
              <option value="VIP Raja">VIP Raja</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Pontos</label>
            <input class="form-input" id="fPontos" type="number" min="0" placeholder="0">
          </div>
          <div class="form-group">
            <label class="form-label">Data Primeiro Contacto</label>
            <input class="form-input" id="fData" type="date">
          </div>
          <div class="form-group">
            <label class="form-label">Registado por</label>
            <select class="form-select" id="fRegistadoPor">
              <option value="">Selecionar...</option>
              <option value="Eduardo">Eduardo</option>
              <option value="Zélia">Zélia</option>
              <option value="Catarina">Catarina</option>
              <option value="Joana">Joana</option>
              <option value="Patrícia">Patrícia</option>
              <option value="Vera">Vera</option>
            </select>
          </div>
        </div>
        <div class="form-grid full" style="margin-top:14px">
          <div class="form-group">
            <label class="form-label">Notas</label>
            <textarea class="form-textarea" id="fNotas" placeholder="Preferências, observações, histórico relevante..."></textarea>
          </div>
        </div>
      </div>
      <!-- COMPRAS -->
      <div class="form-section">
        <div class="form-section-title">Historial de Compras</div>
        <div id="comprasForm"></div>
        <button class="add-compra-btn" onclick="addCompraForm()">+ Adicionar Compra</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btnDelete" style="display:none;margin-right:auto" onclick="deleteCliente()">Eliminar</button>
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveCliente()">Guardar Cliente</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var clientes = [];
var editingId = null;
var comprasTemp = [];
var scriptUrl = 'https://script.google.com/macros/s/AKfycbz0s1O9FBlighyTKVp-rrnv8fLTIwBca_J026CM0HG3AEM1YNiKVOJZA6GllMkJuqsT/exec';
var syncing = false;

// Load from localStorage first, then sync with Sheets
try { clientes = JSON.parse(localStorage.getItem('rp_crm') || '[]'); } catch(e) { clientes = []; }

function saveClientes() {
  try { localStorage.setItem('rp_crm', JSON.stringify(clientes)); } catch(e) {}
}

function setConnStatus(msg, color) {
  var el = document.getElementById('crmConn');
  if(el) { el.textContent = msg; el.style.color = color || '#4A7A4A'; }
}

async function fetchFromSheets() {
  setConnStatus('● A sincronizar...', '#B8782A');
  try {
    var res = await fetch(scriptUrl + '?action=get');
    var data = await res.json();
    if(data.clientes && data.clientes.length >= 0) {
      clientes = data.clientes;
      saveClientes();
      setConnStatus('● Ligado ao Google Sheets · ' + clientes.length + ' clientes', '#4A7A4A');
      renderLista();
      renderStats();
    }
  } catch(e) {
    setConnStatus('● A funcionar offline', '#8A3A2A');
  }
}

async function syncCliente(cliente) {
  try {
    await fetch(scriptUrl, {
      method: 'POST',
      body: JSON.stringify({ action: 'save', cliente: cliente })
    });
  } catch(e) {
    console.log('Sync failed, saved locally');
  }
}

async function syncDelete(id) {
  try {
    await fetch(scriptUrl + '?action=delete&id=' + id);
  } catch(e) { console.log('Delete sync failed'); }
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmt(v) { return '€' + Number(v||0).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function showToast(msg) {
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

function getNivel(totalGasto) {
  if(totalGasto>=500) return 'VIP Raja';
  if(totalGasto>=300) return 'Ouro';
  if(totalGasto>=150) return 'Prata';
  return 'Bronze';
}

function nivelBadge(nivel) {
  var cls = nivel==='VIP Raja'?'nivel-vip':nivel==='Ouro'?'nivel-ouro':nivel==='Prata'?'nivel-prata':'nivel-bronze';
  return '<span class="nivel-badge '+cls+'">'+nivel+'</span>';
}

// INIT
window.onload = function() {
  document.getElementById('fData').value = todayStr();
  document.getElementById('fRegistadoPor').value = '';
  renderStats();
  renderLista();
  fetchFromSheets();
};

function switchView(view, btn) {
  ['lista','detail','stats'].forEach(function(v){
    document.getElementById('view-'+v).style.display = v===view?'':'none';
  });
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  if(view==='stats') renderStatsView();
}

function backToLista() {
  switchView('lista', document.querySelectorAll('.tab')[0]);
}

// STATS CARDS
function renderStats() {
  var total = clientes.length;
  var totalGasto = clientes.reduce(function(s,c){return s+getTotalGasto(c);},0);
  var vips = clientes.filter(function(c){return c.nivel==='VIP Raja'||getNivel(getTotalGasto(c))==='VIP Raja';}).length;
  var hoje = todayStr().substring(0,7);
  var novos = clientes.filter(function(c){return c.dataPrimeiro&&c.dataPrimeiro.startsWith(hoje);}).length;
  document.getElementById('statsCards').innerHTML =
    statCard('Total Clientes', total, 'registados') +
    statCard('Volume Total', fmt(totalGasto), 'em compras') +
    statCard('VIP Raja', vips, 'clientes premium') +
    statCard('Novos Este Mês', novos, 'registos');
}

function statCard(label, value, sub) {
  return '<div class="stat"><div class="stat-label">'+label+'</div><div class="stat-value">'+value+'</div><div class="stat-sub">'+sub+'</div></div>';
}

function getTotalGasto(c) {
  if(!c.compras||!c.compras.length) return 0;
  return c.compras.reduce(function(s,p){return s+Number(p.valor||0);},0);
}

// LISTA
function renderLista() {
  var q = (document.getElementById('searchInput').value||'').toLowerCase();
  var canal = document.getElementById('filterCanal').value;
  var nivel = document.getElementById('filterNivel').value;
  var filtered = clientes.filter(function(c){
    var match = !q || (c.nome&&c.nome.toLowerCase().includes(q)) ||
      (c.telefone&&c.telefone.includes(q)) || (c.pais&&c.pais.toLowerCase().includes(q));
    var matchCanal = !canal || c.canal===canal;
    var matchNivel = !nivel || (c.nivel||getNivel(getTotalGasto(c)))===nivel;
    return match && matchCanal && matchNivel;
  });
  filtered.sort(function(a,b){return getTotalGasto(b)-getTotalGasto(a);});
  var list = document.getElementById('clientsList');
  if(!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum cliente encontrado</div><div class="empty-sub">Tenta ajustar a pesquisa ou adiciona um novo cliente</div></div>';
    return;
  }
  list.innerHTML = filtered.map(function(c){
    var total = getTotalGasto(c);
    var niv = c.nivel || getNivel(total);
    var compras = c.compras ? c.compras.length : 0;
    return '<div class="client-row" onclick="openDetail(\''+c.id+'\')">'+
      '<div class="client-name">'+(c.nome||'—')+'</div>'+
      '<div class="client-phone">'+(c.telefone||'—')+'</div>'+
      '<div class="client-country" style="font-size:14px">'+(c.pais||'—')+'</div>'+
      '<div class="client-notes">'+(c.notas||'—')+'</div>'+
      '<div class="client-total">'+fmt(total)+'</div>'+
      '<div class="client-buys" style="position:relative">'+compras+(compras>0&&compras%5===0?'<span style="position:absolute;top:-6px;right:-4px;font-size:10px">🎉</span>':'')+'</div>'+
      '<div>'+nivelBadge(niv)+'</div>'+
      '</div>';
  }).join('');
  renderStats();
}


function comprasProgressBar(n) {
  var cycle = n % 5;
  var completed = Math.floor(n / 5);
  var pct = Math.round((cycle / 5) * 100);
  var nextDiscount = 5 - cycle;
  var html = '<div style="margin:14px 0;background:rgba(255,255,255,.08);border-radius:12px;padding:14px 16px">';
  if(cycle === 0 && n > 0) {
    // Just hit 5 — show discount banner
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">' +
      '<span style="font-size:22px">🎉</span>' +
      '<div><div style="font-family:Cormorant Garamond,serif;font-size:18px;color:#E5B05A">Desconto de 15% disponível!</div>' +
      '<div style="font-size:12px;color:rgba(240,230,211,.6)">'+n+' compras realizadas — oferecer desconto na próxima compra</div></div></div>';
  } else {
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
      '<span style="font-size:12px;color:rgba(240,230,211,.7)">Progresso para desconto 15%</span>' +
      '<span style="font-size:12px;font-weight:600;color:#E5B05A">'+cycle+'/5 compras</span></div>';
  }
  // Progress dots
  html += '<div style="display:flex;gap:8px;margin-bottom:8px">';
  for(var i=0;i<5;i++){
    var filled = i < cycle;
    var isNext = i === cycle;
    html += '<div style="flex:1;height:6px;border-radius:99px;background:'+(filled?'#C8913A':isNext?'rgba(200,145,58,.3)':'rgba(255,255,255,.1)')+'"></div>';
  }
  html += '</div>';
  if(cycle === 0 && n === 0) {
    html += '<div style="font-size:11px;color:rgba(240,230,211,.5)">Primeira compra ainda por registar</div>';
  } else if(cycle === 0 && n > 0) {
    html += '<div style="font-size:11px;color:#8DC47A">'+completed+' desconto(s) já atribuído(s) anteriormente</div>';
  } else {
    html += '<div style="font-size:11px;color:rgba(240,230,211,.5)">Faltam <strong style="color:#E5B05A">'+nextDiscount+'</strong> compra(s) para desconto de 15%</div>';
  }
  html += '</div>';
  return html;
}

    '<button class="btn-primary" onclick="openEditCliente(\''+c.id+'\')" style="font-size:12px;padding:8px 16px">✎ Editar</button>' +

  html += '<div class="detail-grid">';

  html += '<div><div class="detail-card">' +
    '<div class="detail-card-title">Informação</div>' +
    infoRow('Telefone', c.telefone||'—') +
    infoRow('Nome', c.nome||'—') +
    infoRow('Email', c.email||'—') +
    infoRow('País', c.pais||'—') +
    infoRow('Canal Origem', c.canal||'—') +

    infoRow('Pontos', (c.pontos||0)+' pts') +
    infoRow('Nº Compras', compras.length + (compras.length > 0 && compras.length % 5 === 0 ? ' 🎉 -15%' : ' (' + (5 - compras.length%5) + ' para desconto)')) +

  if(c.notas) {

      '<div class="detail-card-title">Notas</div>' +
      '<div style="font-size:13px;color:var(--muted);line-height:1.6">'+c.notas+'</div></div>';
  }
  html += '</div>';

  // Compras
  html += '<div><div class="detail-card">' +
    '<div class="detail-card-title" style="display:flex;justify-content:space-between;align-items:center">' +
    'Historial de Compras' +
    '<button class="btn-primary" onclick="openEditCliente(\''+c.id+'\')" style="font-size:11px;padding:5px 12px">+ Compra</button>' +
    '</div>';

  if(!compras.length) {
    html += '<div style="text-align:center;padding:30px;color:var(--muted);font-style:italic;font-size:13px">Sem compras registadas</div>';
  } else {
    compras.slice().sort(function(a,b){return (b.data||'').localeCompare(a.data||'');}).forEach(function(p){
      html += '<div class="compra-card">' +
        '<div class="compra-card-header"><span class="compra-canal">'+(p.canal||'—')+'</span><span class="compra-data">'+(p.data||'')+'</span></div>' +
        ((p.items&&p.items.length)?p.items.map(function(it){return (it.referencia?'<span style="display:inline-block;background:var(--gold-pale);color:var(--gold);font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:4px;margin-right:4px;margin-bottom:4px">'+it.referencia+'</span>':'')+( it.descricao?'<div class="compra-desc" style="margin-bottom:3px">'+it.descricao+'</div>':'');}).join(''):(p.descricao?'<div class="compra-desc">'+p.descricao+'</div>':'')) +

        '</div>';
    });

  html += '</div></div></div>';

function infoRow(label, value) {

function removeCompra(idx) {

        '<input class="form-input" type="text" value="' + (item.descricao||'') + '" placeholder="Descrição do artigo" style="font-size:12px;padding:7px 10px" oninput="comprasTemp[' + i + '].items[' + j + '].descricao=this.value">' +
        (p.items.length > 1 ? '<button onclick="removeItem(' + i + ',' + j + ')" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-size:12px">✕</button>' : '<div style="width:26px"></div>') +

      '<div class="form-group"><label class="form-label">Canal</label>' +

function removeItem(i, j) {

function saveCliente() {
  var tel = document.getElementById('fTelefone').value.trim();
  if(!tel) { showToast('⚠ Telefone é obrigatório'); return; }

  // check duplicate phone
  var existing = clientes.find(function(c){return c.telefone===tel && c.id!==editingId;});
  if(existing) { showToast('⚠ Já existe um cliente com este número'); return; }

  var total = comprasTemp.reduce(function(s,p){return s+Number(p.valor||0);},0);
  var data = {
    id: editingId || String(Date.now()),
    telefone: tel,
    nome: document.getElementById('fNome').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    pais: document.getElementById('fPais').value,
    canal: document.getElementById('fCanal').value,
    nivel: document.getElementById('fNivel').value || getNivel(total),
    pontos: Number(document.getElementById('fPontos').value||0),
    dataPrimeiro: document.getElementById('fData').value,
    registadoPor: document.getElementById('fRegistadoPor').value,
    notas: document.getElementById('fNotas').value.trim(),
    compras: comprasTemp.filter(function(p){return p.valor;}),
    updatedAt: new Date().toISOString()
  };

  if(editingId) {
    var idx = clientes.findIndex(function(c){return c.id===editingId;});
    if(idx>=0) clientes[idx] = data;
  } else {
    data.createdAt = new Date().toISOString();
    clientes.push(data);
  }

  saveClientes();
  syncCliente(data);
  closeModal();
  renderLista();
  showToast('✓ Cliente guardado com sucesso!');

  // if in detail, refresh
  if(document.getElementById('view-detail').style.display !== 'none') {
    openDetail(data.id);
  }
}

function deleteCliente() {
  if(!editingId) return;
  if(!confirm('Tens a certeza que queres eliminar este cliente?')) return;
  var delId = editingId;
  clientes = clientes.filter(function(c){return c.id!==delId;});
  saveClientes();
  syncDelete(delId);
  closeModal();
  backToLista();
  showToast('Cliente eliminado');
}

      var m = c.dataPrimeiro.substring(0,7);
      meses[m] = (meses[m]||0) + 1;
    }

  var html = '<div class="stats" style="margin-bottom:28px">' +

    niveis[n] = (niveis[n]||0)+1;
  });

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">';

  html += '<div class="detail-card"><div class="detail-card-title">Por Nível de Fidelização</div>';
  Object.keys(niveis).forEach(function(n){
    var pct = clientes.length ? Math.round((niveis[n]/clientes.length)*100) : 0;
    html += '<div style="margin-bottom:12px">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:4px">' +

      '<div style="background:var(--surface3);border-radius:99px;height:4px;overflow:hidden">' +
      '<div style="width:'+pct+'%;height:100%;background:var(--gold);border-radius:99px"></div></div></div>';
  });
  html += '</div>';

  html += '<div class="detail-card"><div class="detail-card-title">Por Canal de Origem</div>';
  Object.keys(canais).sort(function(a,b){return canais[b]-canais[a];}).forEach(function(c){
    var pct = clientes.length ? Math.round((canais[c]/clientes.length)*100) : 0;
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:10px;align-items:center">' +
      '<span style="font-size:13px;color:var(--dark)">'+c+'</span>' +
      '<span style="font-size:13px;font-weight:600;color:var(--gold)">'+canais[c]+' <span style="font-weight:400;color:var(--muted)">('+pct+'%)</span></span></div>';
  });
  html += '</div>';

  html += '<div class="detail-card"><div class="detail-card-title">Por País</div>';
  Object.keys(paises).sort(function(a,b){return paises[b]-paises[a];}).slice(0,8).forEach(function(p){
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:10px">' +
      '<span style="font-size:13px;color:var(--dark)">'+p+'</span>' +
      '<span style="font-size:13px;font-weight:600;color:var(--muted)">'+paises[p]+'</span></div>';
  });
  html += '</div>';

  html += '<div class="detail-card"><div class="detail-card-title">Top 5 Clientes</div>';
  clientes.slice().sort(function(a,b){return getTotalGasto(b)-getTotalGasto(a);}).slice(0,5).forEach(function(c,i){
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;cursor:pointer" onclick="openDetail(\''+c.id+'\')">' +
      '<div><span style="font-size:11px;color:var(--muted);margin-right:8px">'+(i+1)+'.</span>' +
      '<span style="font-size:13px;color:var(--dark)">'+(c.nome||c.telefone||'—')+'</span></div>' +
      '<span style="font-family:Cormorant Garamond,serif;font-size:16px;color:var(--gold)">'+fmt(getTotalGasto(c))+'</span></div>';
  });
  html += '</div>';

  html += '</div>';
  document.getElementById('statsContent').innerHTML = html;
}

// EXPORT
function exportCSV() {
  var rows = [['Telefone','Nome','Email','Pais','Canal','Nivel','Pontos','Total Gasto','Nr Compras','Data Primeiro','Notas']];
  clientes.forEach(function(c){
    rows.push([
      c.telefone||'', c.nome||'', c.email||'', c.pais||'', c.canal||'',
      c.nivel||'', c.pontos||0, getTotalGasto(c).toFixed(2),
      (c.compras||[]).length, c.dataPrimeiro||'', (c.notas||'').replace(/,/g,';')
    ]);
  });
  var csv = rows.map(function(r){return r.join(',');}).join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='raja-pura-clientes.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Exportado com sucesso!');
}
</script>
