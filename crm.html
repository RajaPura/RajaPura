<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raja Pura — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0C0906;--surface:#171210;--surface2:#211A13;--surface3:#2C2218;--gold:#C8913A;--gold-dim:#7A5A1E;--cream:#F0E6D3;--muted:#7A6A55;--muted2:#4A3D2E;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;}
.hdr{background:var(--surface);border-bottom:1px solid var(--surface3);padding:0 20px;}
.hdr-inner{max-width:900px;margin:0 auto;padding:16px 0;display:flex;justify-content:space-between;align-items:center;}
.brand{font-family:'Cormorant Garamond',serif;font-size:22px;}
.sub{font-size:10px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:2px;}
.conn{font-size:11px;color:var(--muted);}
.main{max-width:900px;margin:0 auto;padding:20px;}
/* NAV TABS */
.nav{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:12px;padding:6px;}
.nav button{flex:1;padding:10px;background:transparent;border:none;border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s;}
.nav button.active{background:var(--gold);color:#0C0906;font-weight:700;}
/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.sinput{flex:1;min-width:150px;padding:10px 14px;background:var(--surface);border:1px solid var(--surface3);border-radius:10px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.sfilt{padding:10px 12px;background:var(--surface);border:1px solid var(--surface3);border-radius:10px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.btn-g{padding:10px 16px;background:var(--gold);border:none;border-radius:10px;color:#0C0906;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;}
/* CLIENT CARDS */
.cc{background:var(--surface);border-radius:12px;padding:14px 18px;border:1px solid var(--surface3);cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cc:hover{border-color:var(--gold-dim);}
.cn{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--cream);}
.cm{font-size:12px;color:var(--muted);margin-top:2px;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;}
.bg{background:rgba(200,145,58,.15);color:var(--gold);}
.bb{background:rgba(90,138,181,.15);color:#7AAAD5;}
.bv{background:rgba(90,158,90,.15);color:#8DC47A;}
.btn-cp{padding:7px 14px;background:var(--gold);border:none;border-radius:8px;color:#0C0906;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;margin-left:10px;flex-shrink:0;}
/* DETAIL */
.dc{background:var(--surface);border-radius:14px;padding:22px;border:1px solid var(--surface3);margin-bottom:14px;}
.dn{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--cream);margin-bottom:4px;}
.dp{font-size:13px;color:var(--muted);margin-bottom:10px;}
.dm{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.da{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.be{padding:9px 16px;background:transparent;border:1px solid var(--gold-dim);border-radius:9px;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.bc{padding:9px 20px;background:var(--gold);border:none;border-radius:9px;color:#0C0906;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;}
.back{padding:8px 14px;background:transparent;border:1px solid var(--surface3);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;margin-bottom:16px;}
.dots{display:flex;gap:5px;margin:6px 0;}
.dot{width:32px;height:6px;border-radius:99px;background:var(--surface3);}
.dot.on{background:var(--gold);}
.ci{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--surface3);}
.ci-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.ci-num{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);}
.ci-val{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--cream);}
/* LTV */
.ltv-row{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--surface3);cursor:pointer;}
.ltv-row:hover{opacity:.8;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
.kpi{background:var(--surface);border-radius:12px;padding:18px;text-align:center;border:1px solid var(--surface3);}
.kpi-l{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.kpi-v{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);}
/* SEGMENTOS */
.seg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.seg-card{background:var(--surface);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent;}
.seg-card:hover{transform:translateY(-2px);}
.seg-n{font-family:'Cormorant Garamond',serif;font-size:38px;margin:6px 0;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.overlay.open{display:flex;}
.mbox{background:var(--surface);border-radius:18px;padding:26px;width:100%;max-width:500px;border:1px solid var(--gold-dim);margin:auto;}
.mt{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--cream);margin-bottom:18px;}
.fg{margin-bottom:12px;}
.fl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
.fi{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--surface3);border-radius:9px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.fi:focus{border-color:var(--gold-dim);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mbtns{display:flex;gap:8px;margin-top:18px;}
.bcan{flex:1;padding:10px;background:transparent;border:1px solid var(--surface3);border-radius:9px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.bsav{flex:2;padding:10px;background:var(--gold);border:none;border-radius:9px;color:#0C0906;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;}
.bdel{padding:10px 12px;background:rgba(196,74,42,.15);border:1px solid rgba(196,74,42,.3);border-radius:9px;color:#E07050;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.cpf{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--surface3);}
.badd{width:100%;padding:9px;background:transparent;border:1px dashed var(--gold-dim);border-radius:9px;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:12px;}
.irow{display:grid;grid-template-columns:1fr 2fr;gap:6px;margin-bottom:6px;}
.brem{padding:3px 8px;background:transparent;border:1px solid rgba(196,74,42,.3);border-radius:6px;color:#E07050;cursor:pointer;font-size:11px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#5A9E5A;color:white;padding:12px 22px;border-radius:99px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:40px;color:var(--muted);font-style:italic;}
.exp-btn{padding:8px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;}
@media(max-width:600px){.frow{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-inner">
    <div><div class="sub">Raja Pura</div><div class="brand">CRM — Clientes</div></div>
    <div class="conn" id="connEl">A ligar...</div>
  </div>
</div>
<div class="main">
  <div class="nav">
    <button id="tab-clientes" onclick="switchTab('clientes')" class="active">👥 Clientes</button>
    <button id="tab-ltv" onclick="switchTab('ltv')">📊 LTV</button>
    <button id="tab-segmentos" onclick="switchTab('segmentos')">🎯 Segmentos</button>
  </div>
  <div id="view-clientes"></div>
  <div id="view-ltv" style="display:none"></div>
  <div id="view-segmentos" style="display:none"></div>
</div>

<div class="overlay" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="mbox">
    <div class="mt" id="mTitle">Novo Cliente</div>
    <div id="pFields">
      <div class="frow">
        <div class="fg"><label class="fl">Telefone *</label><input class="fi" id="fTel" type="tel"></div>
        <div class="fg"><label class="fl">Nome</label><input class="fi" id="fNome" type="text"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Email</label><input class="fi" id="fEmail" type="email"></div>
        <div class="fg"><label class="fl">País</label><input class="fi" id="fPais" type="text" placeholder="Portugal"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Canal</label>
          <select class="fi" id="fCan"><option value="loja">Loja</option><option value="online">Online</option><option value="instagram">Instagram</option><option value="whatsapp">WhatsApp</option><option value="etsy">Etsy</option></select>
        </div>
        <div class="fg"><label class="fl">Registado por</label>
          <select class="fi" id="fReg"><option>Eduardo</option><option>Zélia</option><option>Catarina</option><option>Joana</option><option>Patrícia</option><option>Vera</option></select>
        </div>
      </div>
      <div class="fg"><label class="fl">Notas</label><input class="fi" id="fNotas" type="text"></div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px">Compras</div>
      <div id="cpForm"></div>
      <button class="badd" onclick="addCp()">+ Adicionar Compra</button>
    </div>
    <div class="mbtns">
      <button class="bcan" onclick="closeModal()">Cancelar</button>
      <button class="bdel" id="bDel" style="display:none" onclick="delCliente()">Apagar</button>
      <button class="bsav" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var SCRIPT='https://script.google.com/macros/s/AKfycbym0lasbBoqIXZPMgPCjCR12RIieSu8ENc_cZA7n_h4eoRh6jiZUjWJdCzDXTzGwAzl/exec';
var MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var clientes=[],editId=null,novaCompraId=null,cps=[],currentTab='clientes',detailId=null;

function today(){return new Date().toISOString().split('T')[0];}
function fmtV(v){return Number(String(v||0).replace(',','.')).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtD(d){if(!d)return'';try{var p=d.split('-');return p[2]+' '+MESES[parseInt(p[1])-1]+' '+p[0];}catch(e){return d;}}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function saveLocal(){try{localStorage.setItem('rp_crm5',JSON.stringify(clientes));}catch(e){}}
function loadLocal(){try{var d=localStorage.getItem('rp_crm5')||localStorage.getItem('rp_crm4')||localStorage.getItem('rp_crm3');if(d)clientes=JSON.parse(d);}catch(e){}}

window.onload=function(){
  loadLocal();
  renderTab('clientes');
  fetch(SCRIPT+'?action=get').then(function(r){return r.json();}).then(function(d){
    if(d.clientes&&d.clientes.length>=0){clientes=d.clientes;saveLocal();document.getElementById('connEl').textContent='✓ Ligado · '+clientes.length+' clientes';}
    renderTab(currentTab);
  }).catch(function(){document.getElementById('connEl').textContent='Offline';});
};

function switchTab(tab){
  currentTab=tab;detailId=null;
  ['clientes','ltv','segmentos'].forEach(function(t){
    document.getElementById('view-'+t).style.display=t===tab?'':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  renderTab(tab);
}

function renderTab(tab){
  if(tab==='clientes') renderClientes();
  else if(tab==='ltv') renderLTV();
  else if(tab==='segmentos') renderSegmentos();
}

// ===================== CLIENTES =====================
function renderClientes(){
  var el=document.getElementById('view-clientes');
  if(detailId){renderDetalhe(detailId,el);return;}
  el.innerHTML='';

  // Search bar
  var sb=document.createElement('div');sb.className='search-bar';
  var si=document.createElement('input');si.className='sinput';si.id='sInput';si.placeholder='🔍 Pesquisar...';si.oninput=function(){renderClientes();};
  var sf=document.createElement('select');sf.className='sfilt';sf.id='sFilt';
  sf.innerHTML='<option value="">Todos os canais</option><option value="loja">Loja</option><option value="online">Online</option><option value="instagram">Instagram</option><option value="whatsapp">WhatsApp</option><option value="etsy">Etsy</option>';
  sf.onchange=function(){renderClientes();};
  var bn=document.createElement('button');bn.className='btn-g';bn.textContent='+ Novo';bn.onclick=openNovo;
  var be=document.createElement('button');be.className='be';be.style.padding='10px 14px';be.textContent='⬇ CSV';be.onclick=exportarTodos;
  sb.appendChild(si);sb.appendChild(sf);sb.appendChild(bn);sb.appendChild(be);
  el.appendChild(sb);

  var q=(si.value||'').toLowerCase(),fc=sf.value||'';
  var f=clientes.filter(function(c){
    return(!q||(c.nome||'').toLowerCase().includes(q)||(c.telefone||'').includes(q))&&(!fc||(c.canal||'')===fc);
  }).sort(function(a,b){return(a.nome||'').localeCompare(b.nome||'');});

  if(!f.length){el.innerHTML+='<div class="empty">Nenhum cliente</div>';return;}
  f.forEach(function(c){
    var cps2=c.compras||[],tot=cps2.reduce(function(s,p){return s+Number(String(p.valor||0).replace(',','.'));},0);
    var row=document.createElement('div');row.className='cc';
    var info=document.createElement('div');info.style.flex='1';
    info.innerHTML='<div class="cn">'+(c.nome||'Sem nome')+'</div>'+
      '<div class="cm">📞 '+(c.telefone||'—')+(c.pais?' · '+c.pais:'')+'</div>'+
      '<div class="badges"><span class="badge bg">'+cps2.length+' compra'+(cps2.length!==1?'s':'')+'</span>'+
      '<span class="badge bb">'+(c.canal||'loja')+'</span>'+
      (tot>0?'<span class="badge bv">€'+fmtV(tot)+'</span>':'')+
      '</div>';
    var btn=document.createElement('button');btn.className='btn-cp';btn.textContent='+ Compra';
    btn.addEventListener('click',(function(id){return function(e){e.stopPropagation();openNovaCompra(id);};})(String(c.id)));
    row.appendChild(info);row.appendChild(btn);
    row.addEventListener('click',(function(id){return function(){detailId=id;renderClientes();};})(String(c.id)));
    el.appendChild(row);
  });
}

function renderDetalhe(id,el){
  var c=clientes.find(function(x){return String(x.id)===String(id);});
  if(!c){detailId=null;renderClientes();return;}
  var cps2=c.compras||[],tot=cps2.reduce(function(s,p){return s+Number(String(p.valor||0).replace(',','.'));},0);
  var cycle=cps2.length%5;
  el.innerHTML='';

  var back=document.createElement('button');back.className='back';back.textContent='← Voltar';
  back.onclick=function(){detailId=null;renderClientes();};
  el.appendChild(back);

  var card=document.createElement('div');card.className='dc';
  var h='<div class="dn">'+(c.nome||'Sem nome')+'</div>'+
    '<div class="dp">📞 '+(c.telefone||'—')+'</div>'+
    '<div class="dm">';
  if(c.email)h+='<span class="badge bb">✉ '+c.email+'</span>';
  if(c.pais)h+='<span class="badge bg">🌍 '+c.pais+'</span>';
  if(c.canal)h+='<span class="badge bv">'+c.canal+'</span>';
  if(c.registadoPor)h+='<span class="badge" style="background:var(--surface2);color:var(--muted)">👤 '+c.registadoPor+'</span>';
  h+='</div>';
  h+='<div style="margin:10px 0"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px"><span>Desconto 15% na 5ª compra</span><span>'+cps2.length+' compra'+(cps2.length!==1?'s':'')+'</span></div><div class="dots">';
  for(var i=0;i<5;i++)h+='<div class="dot'+(i<cycle?' on':'')+'"></div>';
  h+='</div>';
  if(cycle===0&&cps2.length>0)h+='<div style="font-size:12px;color:var(--gold);font-weight:600;margin-top:5px">🎉 Desconto 15% conquistado!</div>';
  else if(cycle>0)h+='<div style="font-size:11px;color:var(--muted);margin-top:4px">Faltam '+(5-cycle)+' para o desconto</div>';
  h+='</div>';
  if(c.notas)h+='<div style="font-size:13px;color:var(--muted);padding:8px 0;border-top:1px solid var(--surface3)">'+c.notas+'</div>';
  h+='<div style="padding-top:10px;border-top:1px solid var(--surface3);display:flex;justify-content:space-between;align-items:center;margin-top:6px">';
  h+='<span style="font-size:12px;color:var(--muted)">Total gasto</span>';
  h+='<span style="font-family:Cormorant Garamond,serif;font-size:20px;color:var(--gold)">€'+fmtV(tot)+'</span></div>';
  card.innerHTML=h;

  var da=document.createElement('div');da.className='da';
  var bedit=document.createElement('button');bedit.className='be';bedit.textContent='✏ Editar';
  bedit.addEventListener('click',(function(id){return function(){openEditar(id);};})(String(c.id)));
  var bcomp=document.createElement('button');bcomp.className='bc';bcomp.textContent='+ Nova Compra';
  bcomp.addEventListener('click',(function(id){return function(){openNovaCompra(id);};})(String(c.id)));
  da.appendChild(bedit);da.appendChild(bcomp);
  card.appendChild(da);
  el.appendChild(card);

  // Historico
  var hist=document.createElement('div');hist.className='dc';
  hist.innerHTML='<div style="font-family:Cormorant Garamond,serif;font-size:17px;color:var(--cream);margin-bottom:12px">Histórico de Compras</div>';
  if(!cps2.length){
    hist.innerHTML+='<div class="empty" style="padding:16px">Sem compras ainda</div>';
  } else {
    cps2.slice().reverse().forEach(function(p,i){
      var num=cps2.length-i,vNum=Number(String(p.valor||0).replace(',','.'));
      var div=document.createElement('div');div.className='ci';
      div.innerHTML='<div class="ci-top"><span class="ci-num">Compra #'+num+(num%5===0?' 🎉':'')+'</span><span class="ci-val">€'+fmtV(vNum)+'</span></div>'+
        '<div style="font-size:12px;color:var(--muted)">'+fmtD(p.data)+(p.canal?' · '+p.canal:'')+(p.registadoPor?' · '+p.registadoPor:'')+'</div>';
      var items=p.items||(p.descricao?[{descricao:p.descricao}]:[]);
      var descs=items.filter(function(it){return it.descricao||it.referencia;}).map(function(it){return(it.referencia?'['+it.referencia+'] ':'')+it.descricao;});
      if(descs.length)div.innerHTML+='<div style="font-size:12px;color:var(--muted);margin-top:4px">'+descs.join(' · ')+'</div>';
      if(p.obs)div.innerHTML+='<div style="font-size:12px;color:var(--muted);font-style:italic;margin-top:3px">'+p.obs+'</div>';
      hist.appendChild(div);
    });
  }
  el.appendChild(hist);
}

// ===================== LTV =====================
function renderLTV(){
  var el=document.getElementById('view-ltv');el.innerHTML='';
  var hoje=new Date();
  var dados=clientes.map(function(c){
    var cps2=c.compras||[];if(!cps2.length)return null;
    var ltv=cps2.reduce(function(s,p){return s+Number(String(p.valor||0).replace(',','.'));},0);
    var ticket=ltv/cps2.length;
    var datas=cps2.map(function(p){return new Date(p.data||'2026-01-01');}).sort(function(a,b){return a-b;});
    var anos=Math.max(0.083,(hoje-datas[0])/(1000*60*60*24*365));
    var meses=Math.max(1,Math.round(anos*12));
    var transAno=cps2.length/anos;
    var diasUltima=Math.round((hoje-datas[datas.length-1])/(1000*60*60*24));
    return{c:c,ltv:ltv,ticket:ticket,nc:cps2.length,meses:meses,transAno:transAno,diasUltima:diasUltima,anos:anos};
  }).filter(Boolean).sort(function(a,b){return b.ltv-a.ltv;});

  var totLTV=dados.reduce(function(s,d){return s+d.ltv;},0);
  var avgTicket=dados.length>0?dados.reduce(function(s,d){return s+d.ticket;},0)/dados.length:0;
  var maxLTV=dados.length>0?dados[0].ltv:1;

  // KPIs
  var kg=document.createElement('div');kg.className='kpi-grid';
  [{l:'LTV Total',v:'€'+fmtV(totLTV)},{l:'Ticket Médio',v:'€'+fmtV(avgTicket)},{l:'Clientes',v:String(dados.length)}].forEach(function(k){
    var d=document.createElement('div');d.className='kpi';
    d.innerHTML='<div class="kpi-l">'+k.l+'</div><div class="kpi-v">'+k.v+'</div>';
    kg.appendChild(d);
  });
  el.appendChild(kg);

  // Ranking
  var rank=document.createElement('div');rank.className='dc';
  rank.innerHTML='<div style="font-family:Cormorant Garamond,serif;font-size:18px;color:var(--cream);margin-bottom:6px">🏆 Ranking LTV</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:16px">LTV = Ticket Médio × Nº Transações reais</div>';

  dados.forEach(function(d,i){
    var pct=Math.round((d.ltv/maxLTV)*100);
    var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    var status=d.diasUltima<=30?{l:'Ativo',c:'#8DC47A'}:d.diasUltima<=90?{l:'Morno',c:'#E5B05A'}:{l:'Inativo',c:'#E07050'};
    var row=document.createElement('div');row.className='ltv-row';
    row.innerHTML='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'+
      '<div style="display:flex;gap:8px;align-items:center">'+
      '<span style="font-size:16px">'+(medal||'<span style="font-size:12px;color:var(--muted)">#'+(i+1)+'</span>')+'</span>'+
      '<div><div style="font-size:14px;color:var(--cream)">'+(d.c.nome||'Sem nome')+'</div>'+
      '<div style="font-size:11px;color:var(--muted)">'+d.nc+' compra'+(d.nc!==1?'s':'')+' · há '+d.diasUltima+' dias</div></div></div>'+
      '<div style="text-align:right">'+
      '<div style="font-family:Cormorant Garamond,serif;font-size:18px;color:var(--gold)">€'+fmtV(d.ltv)+'</div>'+
      '<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:'+status.c+'22;color:'+status.c+'">'+status.l+'</span>'+
      '</div></div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px">'+
      '<div style="background:var(--surface2);border-radius:7px;padding:7px;text-align:center"><div style="font-size:9px;color:var(--muted)">Ticket</div><div style="font-size:12px;font-weight:600">€'+fmtV(d.ticket)+'</div></div>'+
      '<div style="background:var(--surface2);border-radius:7px;padding:7px;text-align:center"><div style="font-size:9px;color:var(--muted)">Transações</div><div style="font-size:12px;font-weight:600">'+d.nc+'x</div></div>'+
      '<div style="background:var(--surface2);border-radius:7px;padding:7px;text-align:center"><div style="font-size:9px;color:var(--muted)">Anos</div><div style="font-size:12px;font-weight:600">'+d.anos.toFixed(1)+'</div></div>'+
      '</div>'+
      '<div style="background:var(--surface3);border-radius:99px;height:4px;overflow:hidden">'+
      '<div style="width:'+pct+'%;height:100%;background:var(--gold);border-radius:99px"></div></div>';
    row.addEventListener('click',(function(id){return function(){switchTab('clientes');setTimeout(function(){detailId=id;renderClientes();},100);};})(String(d.c.id)));
    rank.appendChild(row);
  });
  el.appendChild(rank);
}

// ===================== SEGMENTOS =====================
function getSegKey(c){
  var cps2=c.compras||[];if(!cps2.length)return 'sem';
  var datas=cps2.map(function(p){return new Date(p.data||'2026-01-01');}).sort(function(a,b){return b-a;});
  var dias=Math.round((new Date()-datas[0])/(1000*60*60*24));
  if(dias<=30)return 'ativo';if(dias<=90)return 'morno';return 'inativo';
}

function renderSegmentos(){
  var el=document.getElementById('view-segmentos');el.innerHTML='';
  var SEGS={
    ativo:  {label:'Ativos',      emoji:'🟢',desc:'Últimos 30 dias',cor:'#8DC47A'},
    morno:  {label:'Mornos',      emoji:'🟡',desc:'31 a 90 dias',   cor:'#E5B05A'},
    inativo:{label:'Inativos',    emoji:'🔴',desc:'+90 dias',       cor:'#C44A2A'},
    sem:    {label:'Sem Compras', emoji:'⚪',desc:'Sem compras',    cor:'#7A6A55'}
  };
  var grupos={ativo:[],morno:[],inativo:[],sem:[]};
  var perto=[];
  clientes.forEach(function(c){
    grupos[getSegKey(c)].push(c);
    if((c.compras||[]).length%5===4)perto.push(c);
  });

  // Cards resumo
  var grid=document.createElement('div');grid.className='seg-grid';
  Object.keys(SEGS).forEach(function(key){
    var s=SEGS[key],n=grupos[key].length;
    var card=document.createElement('div');card.className='seg-card';
    card.style.borderColor=s.cor+'55';
    card.innerHTML='<div style="font-size:26px">'+s.emoji+'</div>'+
      '<div class="seg-n" style="color:'+s.cor+'">'+n+'</div>'+
      '<div style="font-size:13px;color:var(--cream);font-weight:500">'+s.label+'</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:3px">'+s.desc+'</div>'+
      '<div style="font-size:11px;color:'+s.cor+';margin-top:10px;font-weight:600">⬇ Exportar CSV</div>';
    card.addEventListener('click',(function(k){return function(){exportarLista(grupos[k],SEGS[k].label);};})(key));
    grid.appendChild(card);
  });
  el.appendChild(grid);

  // Perto do desconto
  if(perto.length){
    var sec=document.createElement('div');sec.className='dc';sec.style.borderColor='var(--gold)';
    var hdr=document.createElement('div');
    hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
    hdr.innerHTML='<div><div style="font-family:Cormorant Garamond,serif;font-size:17px;color:var(--gold)">🎁 Prestes a ganhar 15%</div>'+
      '<div style="font-size:12px;color:var(--muted)">'+perto.length+' cliente'+(perto.length!==1?'s':'')+' na 4ª compra</div></div>';
    var eb=document.createElement('button');eb.className='exp-btn';
    eb.style.cssText='background:var(--gold);color:#0C0906;border:none;';
    eb.textContent='⬇ CSV';
    eb.addEventListener('click',function(){exportarLista(perto,'Perto_Desconto');});
    hdr.appendChild(eb);sec.appendChild(hdr);
    perto.forEach(function(c){
      var row=document.createElement('div');
      row.style.cssText='display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--surface3);cursor:pointer;';
      row.innerHTML='<div><div style="font-size:14px;color:var(--cream)">'+(c.nome||'Sem nome')+'</div>'+
        '<div style="font-size:11px;color:var(--muted)">'+c.telefone+'</div></div>'+
        '<div style="font-size:12px;color:var(--gold);font-weight:600">Falta 1!</div>';
      row.addEventListener('click',(function(id){return function(){switchTab('clientes');setTimeout(function(){detailId=id;renderClientes();},100);};})(String(c.id)));
      sec.appendChild(row);
    });
    el.appendChild(sec);
  }

  // Secções por segmento
  Object.keys(SEGS).forEach(function(key){
    var s=SEGS[key],lista=grupos[key];if(!lista.length)return;
    var sec=document.createElement('div');sec.className='dc';sec.style.marginBottom='14px';
    var hdr=document.createElement('div');
    hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
    hdr.innerHTML='<div><div style="font-family:Cormorant Garamond,serif;font-size:17px;color:'+s.cor+'">'+s.emoji+' '+s.label+'</div>'+
      '<div style="font-size:12px;color:var(--muted)">'+s.desc+' · '+lista.length+' cliente'+(lista.length!==1?'s':'')+'</div></div>';
    var eb=document.createElement('button');eb.className='exp-btn';
    eb.style.cssText='background:transparent;border:1.5px solid '+s.cor+';color:'+s.cor+';';
    eb.textContent='⬇ CSV';
    eb.addEventListener('click',(function(l,n){return function(){exportarLista(l,n);};})(lista,s.label));
    hdr.appendChild(eb);sec.appendChild(hdr);
    lista.forEach(function(c){
      var cps2=c.compras||[],tot=cps2.reduce(function(s,p){return s+Number(String(p.valor||0).replace(',','.'));},0);
      var row=document.createElement('div');
      row.style.cssText='display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--surface3);cursor:pointer;';
      row.innerHTML='<div><div style="font-size:14px;color:var(--cream)">'+(c.nome||'Sem nome')+'</div>'+
        '<div style="font-size:11px;color:var(--muted)">'+c.telefone+(c.email?' · '+c.email:'')+'</div></div>'+
        '<div style="text-align:right"><div style="font-size:13px;color:var(--cream)">'+cps2.length+' compra'+(cps2.length!==1?'s':'')+'</div>'+
        '<div style="font-size:12px;color:'+s.cor+'">€'+fmtV(tot)+'</div></div>';
      row.addEventListener('click',(function(id){return function(){switchTab('clientes');setTimeout(function(){detailId=id;renderClientes();},100);};})(String(c.id)));
      sec.appendChild(row);
    });
    el.appendChild(sec);
  });
}

// ===================== MODAL =====================
function openNovo(){
  editId=null;novaCompraId=null;cps=[];
  document.getElementById('mTitle').textContent='Novo Cliente';
  document.getElementById('bDel').style.display='none';
  document.getElementById('pFields').style.display='';
  ['fTel','fNome','fEmail','fPais','fNotas'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('fCan').value='loja';document.getElementById('fReg').value='Eduardo';
  renderCpForm();document.getElementById('modal').classList.add('open');
}
function openEditar(id){
  var c=clientes.find(function(x){return String(x.id)===String(id);});if(!c)return;
  editId=String(id);novaCompraId=null;
  cps=(c.compras||[]).map(function(p){return Object.assign({},p,{items:(p.items||[]).slice()});});
  document.getElementById('mTitle').textContent='Editar Cliente';
  document.getElementById('bDel').style.display='';
  document.getElementById('pFields').style.display='';
  document.getElementById('fTel').value=c.telefone||'';document.getElementById('fNome').value=c.nome||'';
  document.getElementById('fEmail').value=c.email||'';document.getElementById('fPais').value=c.pais||'';
  document.getElementById('fCan').value=c.canal||'loja';document.getElementById('fReg').value=c.registadoPor||'Eduardo';
  document.getElementById('fNotas').value=c.notas||'';
  renderCpForm();document.getElementById('modal').classList.add('open');
}
function openNovaCompra(id){
  var c=clientes.find(function(x){return String(x.id)===String(id);});if(!c)return;
  editId=null;novaCompraId=String(id);
  cps=[{id:String(Date.now()),data:today(),canal:'loja',registadoPor:'Eduardo',items:[{referencia:'',descricao:''}],valor:'',obs:''}];
  document.getElementById('mTitle').textContent='Nova Compra — '+(c.nome||c.telefone);
  document.getElementById('bDel').style.display='none';document.getElementById('pFields').style.display='none';
  renderCpForm();document.getElementById('modal').classList.add('open');
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('pFields').style.display='';
  editId=null;novaCompraId=null;cps=[];
}
function addCp(){cps.push({id:String(Date.now()),data:today(),canal:'loja',registadoPor:'Eduardo',items:[{referencia:'',descricao:''}],valor:'',obs:''});renderCpForm();}
function remCp(i){cps.splice(i,1);renderCpForm();}
function addItem(ci){if(!cps[ci].items)cps[ci].items=[];cps[ci].items.push({referencia:'',descricao:''});renderCpForm();}
function renderCpForm(){
  var h='';
  cps.forEach(function(p,i){
    if(!p.items||!p.items.length)p.items=[{referencia:'',descricao:''}];
    h+='<div class="cpf"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
      '<span style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1px">Compra '+(i+1)+'</span>';
    if(cps.length>1||novaCompraId)h+='<button class="brem" onclick="remCp('+i+')">Remover</button>';
    h+='</div><div class="frow"><div class="fg"><label class="fl">Data</label><input class="fi" id="cd_'+i+'" type="date" value="'+(p.data||today())+'"></div>'+
      '<div class="fg"><label class="fl">Canal</label><select class="fi" id="cc_'+i+'">'+
      ['loja','online','instagram','whatsapp','etsy'].map(function(v){return '<option value="'+v+'"'+(p.canal===v?' selected':'')+'>'+v+'</option>';}).join('')+'</select></div></div>'+
      '<div class="fg"><label class="fl">Artigos</label>';
    p.items.forEach(function(it,j){
      h+='<div class="irow"><input class="fi" id="cr_'+i+'_'+j+'" placeholder="Ref." value="'+(it.referencia||'')+'">'+
        '<input class="fi" id="cd2_'+i+'_'+j+'" placeholder="Descrição" value="'+(it.descricao||'')+'"></div>';
    });
    h+='<button style="font-size:11px;padding:3px 8px;background:transparent;border:1px dashed var(--muted2);border-radius:6px;color:var(--muted);cursor:pointer;margin-bottom:6px" onclick="addItem('+i+')">+ artigo</button></div>'+
      '<div class="frow"><div class="fg"><label class="fl">Valor (€)</label><input class="fi" id="cv_'+i+'" type="number" step="0.01" placeholder="0.00" value="'+(p.valor||'')+'"></div>'+
      '<div class="fg"><label class="fl">Registado por</label><select class="fi" id="creg_'+i+'">'+
      ['Eduardo','Zélia','Catarina','Joana','Patrícia','Vera'].map(function(r){return '<option'+(p.registadoPor===r?' selected':'')+'>'+r+'</option>';}).join('')+'</select></div></div>'+
      '<div class="fg"><label class="fl">Obs</label><input class="fi" id="co_'+i+'" value="'+(p.obs||'')+'"></div></div>';
  });
  document.getElementById('cpForm').innerHTML=h;
}
function collectCps(){
  return cps.map(function(p,i){
    var items=p.items.map(function(it,j){
      return{referencia:(document.getElementById('cr_'+i+'_'+j)||{value:''}).value.trim(),
        descricao:(document.getElementById('cd2_'+i+'_'+j)||{value:''}).value.trim()};
    }).filter(function(it){return it.referencia||it.descricao;});
    return{id:p.id||String(Date.now()+i),
      data:(document.getElementById('cd_'+i)||{value:today()}).value,
      canal:(document.getElementById('cc_'+i)||{value:'loja'}).value,
      registadoPor:(document.getElementById('creg_'+i)||{value:'Eduardo'}).value,
      items:items,valor:Number((document.getElementById('cv_'+i)||{value:0}).value||0),
      obs:(document.getElementById('co_'+i)||{value:''}).value.trim()};
  });
}
function sync(c){fetch(SCRIPT,{method:'POST',body:JSON.stringify({action:'saveCliente',cliente:c})}).catch(function(){});}
function guardar(){
  if(novaCompraId){
    var c=clientes.find(function(x){return String(x.id)===novaCompraId;});if(!c)return;
    if(!c.compras)c.compras=[];
    collectCps().forEach(function(cp){c.compras.push(cp);});
    saveLocal();sync(c);closeModal();detailId=novaCompraId;renderClientes();toast('✓ Compra adicionada!');return;
  }
  var tel=document.getElementById('fTel').value.trim();
  if(!tel){toast('⚠ Telefone obrigatório');return;}
  if(clientes.find(function(c){return c.telefone===tel&&String(c.id)!==editId;})){toast('⚠ Telefone já existe');return;}
  var cpData=collectCps();
  if(editId){
    var c=clientes.find(function(x){return String(x.id)===editId;});if(!c)return;
    c.telefone=tel;c.nome=document.getElementById('fNome').value.trim();
    c.email=document.getElementById('fEmail').value.trim();c.pais=document.getElementById('fPais').value.trim();
    c.canal=document.getElementById('fCan').value;c.registadoPor=document.getElementById('fReg').value;
    c.notas=document.getElementById('fNotas').value.trim();c.compras=cpData;
    saveLocal();sync(c);closeModal();detailId=editId;renderClientes();toast('✓ Atualizado!');
  } else {
    var novo={id:String(Date.now()),telefone:tel,nome:document.getElementById('fNome').value.trim(),
      email:document.getElementById('fEmail').value.trim(),pais:document.getElementById('fPais').value.trim(),
      canal:document.getElementById('fCan').value,registadoPor:document.getElementById('fReg').value,
      notas:document.getElementById('fNotas').value.trim(),compras:cpData,criadoEm:today()};
    clientes.push(novo);saveLocal();sync(novo);closeModal();detailId=novo.id;renderClientes();toast('✓ Cliente criado!');
  }
}
function delCliente(){
  if(!editId||!confirm('Apagar este cliente?'))return;
  clientes=clientes.filter(function(c){return String(c.id)!==editId;});
  saveLocal();fetch(SCRIPT,{method:'POST',body:JSON.stringify({action:'deleteCliente',id:editId})}).catch(function(){});
  closeModal();detailId=null;renderClientes();toast('Apagado');
}

// ===================== EXPORT =====================
function exportarTodos(){exportarLista(clientes,'Todos_Clientes');}
function exportarLista(lista,titulo){
  var linhas=['"Nome";"Telefone";"Email";"Pais";"Canal";"Num Compras";"Total EUR";"Ultima Compra";"Notas"'];
  lista.forEach(function(c){
    var cps2=c.compras||[],tot=cps2.reduce(function(s,p){return s+Number(String(p.valor||0).replace(',','.'));},0);
    var datas=cps2.map(function(p){return p.data||'';}).filter(Boolean).sort();
    linhas.push([c.nome||'',c.telefone||'',c.email||'',c.pais||'',c.canal||'',
      cps2.length,fmtV(tot),datas.length?datas[datas.length-1]:'',c.notas||'']
      .map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(';'));
  });
  var NL=String.fromCharCode(13)+String.fromCharCode(10);
  var blob=new Blob([linhas.join(NL)],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=(titulo||'clientes').replace(/[^a-z0-9]/gi,'_')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('✓ Exportado!');
}
</script>
