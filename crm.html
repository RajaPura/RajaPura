<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raja Pura — Segmentos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0C0906;--surface:#171210;--surface2:#211A13;--surface3:#2C2218;--gold:#C8913A;--gold-dim:#7A5A1E;--cream:#F0E6D3;--muted:#7A6A55;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--surface3);padding:0 24px;}
.header-inner{max-width:900px;margin:0 auto;padding:20px 0;display:flex;justify-content:space-between;align-items:center;}
.brand{font-family:'Cormorant Garamond',serif;font-size:24px;}
.main{max-width:900px;margin:0 auto;padding:24px;}
.nav{display:flex;gap:10px;margin-bottom:24px;}
.nav a{padding:9px 16px;border-radius:9px;text-decoration:none;font-size:13px;border:1px solid var(--surface3);color:var(--muted);}
.nav a.active{background:var(--gold);color:#0C0906;font-weight:700;border-color:var(--gold);}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
.seg-card{background:var(--surface);border-radius:14px;padding:22px;text-align:center;cursor:pointer;transition:all .2s;border:2px solid transparent;}
.seg-card:hover{transform:translateY(-2px);}
.seg-num{font-family:'Cormorant Garamond',serif;font-size:40px;margin:8px 0;}
.seg-label{font-size:14px;color:var(--cream);font-weight:500;}
.seg-desc{font-size:11px;color:var(--muted);margin-top:4px;}
.seg-export{margin-top:12px;font-size:11px;font-weight:600;}
.section{background:var(--surface);border-radius:14px;padding:22px;margin-bottom:16px;border:1px solid var(--surface3);}
.section-title{font-family:'Cormorant Garamond',serif;font-size:20px;margin-bottom:4px;}
.section-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.exp-btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;}
.client-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--surface3);cursor:pointer;}
.client-row:last-child{border-bottom:none;}
.client-row:hover{opacity:.8;}
.cname{font-size:14px;color:var(--cream);}
.cmeta{font-size:11px;color:var(--muted);margin-top:2px;}
.cright{text-align:right;}
.cnum{font-size:13px;color:var(--cream);}
.ctot{font-size:12px;}
.conn{font-size:11px;color:var(--muted);}
.loading{text-align:center;padding:60px;color:var(--muted);font-style:italic;}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div>
      <div style="font-size:10px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:2px">Raja Pura</div>
      <div class="brand">Segmentos de Clientes</div>
    </div>
    <div class="conn" id="connEl">A carregar...</div>
  </div>
</div>
<div class="main">
  <div class="nav">
    <a href="crm.html">← CRM</a>
    <a href="segmentos.html" class="active">🎯 Segmentos</a>
  </div>
  <div id="content"><div class="loading">A carregar clientes...</div></div>
</div>

<script>
var SCRIPT = 'https://script.google.com/macros/s/AKfycbym0lasbBoqIXZPMgPCjCR12RIieSu8ENc_cZA7n_h4eoRh6jiZUjWJdCzDXTzGwAzl/exec';
var clientes = [];

function fmtV(v){return Number(String(v||0).replace(',','.')).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2});}

function getSegKey(c){
  var cps2 = c.compras||[];
  if(!cps2.length) return 'sem';
  var datas = cps2.map(function(p){return new Date(p.data||'2026-01-01');}).sort(function(a,b){return b-a;});
  var dias = Math.round((new Date()-datas[0])/(1000*60*60*24));
  if(dias<=30) return 'ativo';
  if(dias<=90) return 'morno';
  return 'inativo';
}

window.onload = function(){
  try{var d=localStorage.getItem('rp_crm5')||localStorage.getItem('rp_crm4')||localStorage.getItem('rp_crm3');if(d){clientes=JSON.parse(d);render();}}catch(e){}
  fetch(SCRIPT+'?action=get').then(function(r){return r.json();}).then(function(d){
    if(d.clientes&&d.clientes.length){clientes=d.clientes;document.getElementById('connEl').textContent='✓ Ligado · '+clientes.length+' clientes';}
    render();
  }).catch(function(){document.getElementById('connEl').textContent='Offline';});
};

function render(){
  var SEGS = {
    ativo:  {label:'Ativos',      emoji:'🟢',desc:'Compraram nos últimos 30 dias',cor:'#8DC47A'},
    morno:  {label:'Mornos',      emoji:'🟡',desc:'Compraram há 31 a 90 dias',   cor:'#E5B05A'},
    inativo:{label:'Inativos',    emoji:'🔴',desc:'Sem compra há mais de 90 dias',cor:'#C44A2A'},
    sem:    {label:'Sem Compras', emoji:'⚪',desc:'Ainda sem compras registadas', cor:'#7A6A55'}
  };

  var grupos={ativo:[],morno:[],inativo:[],sem:[]};
  var perto=[];
  clientes.forEach(function(c){
    grupos[getSegKey(c)].push(c);
    if((c.compras||[]).length%5===4) perto.push(c);
  });

  var el=document.getElementById('content');
  el.innerHTML='';

  // Cards resumo
  var grid=document.createElement('div');
  grid.className='grid';
  Object.keys(SEGS).forEach(function(key){
    var s=SEGS[key]; var n=grupos[key].length;
    var card=document.createElement('div');
    card.className='seg-card';
    card.style.borderColor=s.cor+'55';
    card.innerHTML='<div style="font-size:28px">'+s.emoji+'</div>'+
      '<div class="seg-num" style="color:'+s.cor+'">'+n+'</div>'+
      '<div class="seg-label">'+s.label+'</div>'+
      '<div class="seg-desc">'+s.desc+'</div>'+
      '<div class="seg-export" style="color:'+s.cor+'">⬇ Exportar CSV</div>';
    card.addEventListener('click',function(){exportar(grupos[key],s.label);});
    grid.appendChild(card);
  });
  el.appendChild(grid);

  // Perto do desconto
  if(perto.length){
    var sec=document.createElement('div');
    sec.className='section';
    sec.style.borderColor='var(--gold)';
    var hdr=document.createElement('div');
    hdr.className='sec-header';
    hdr.innerHTML='<div><div class="section-title" style="color:var(--gold)">🎁 Prestes a ganhar 15% de desconto</div>'+
      '<div class="section-sub" style="margin-bottom:0">'+perto.length+' cliente'+(perto.length!==1?'s':'')+' na 4ª compra — próxima compra dá desconto!</div></div>';
    var btn=document.createElement('button');
    btn.className='exp-btn';
    btn.style.cssText='background:var(--gold);color:#0C0906;';
    btn.textContent='⬇ Exportar';
    btn.addEventListener('click',function(){exportar(perto,'Perto_Desconto');});
    hdr.appendChild(btn);
    sec.appendChild(hdr);
    perto.forEach(function(c){
      var row=document.createElement('div');
      row.className='client-row';
      row.innerHTML='<div><div class="cname">'+(c.nome||'Sem nome')+'</div><div class="cmeta">'+c.telefone+'</div></div>'+
        '<div class="cright"><div style="font-size:12px;color:var(--gold);font-weight:600">Falta 1 compra!</div></div>';
      row.addEventListener('click',function(){window.location.href='crm.html';});
      sec.appendChild(row);
    });
    el.appendChild(sec);
  }

  // Secções por segmento
  Object.keys(SEGS).forEach(function(key){
    var s=SEGS[key]; var lista=grupos[key];
    if(!lista.length) return;
    var sec=document.createElement('div');
    sec.className='section';
    var hdr=document.createElement('div');
    hdr.className='sec-header';
    hdr.innerHTML='<div><div class="section-title" style="color:'+s.cor+'">'+s.emoji+' '+s.label+'</div>'+
      '<div class="section-sub" style="margin-bottom:0">'+s.desc+' · '+lista.length+' cliente'+(lista.length!==1?'s':'')+'</div></div>';
    var btn=document.createElement('button');
    btn.className='exp-btn';
    btn.style.cssText='background:transparent;border:1.5px solid '+s.cor+';color:'+s.cor+';';
    btn.textContent='⬇ Exportar';
    btn.addEventListener('click',(function(l,n){return function(){exportar(l,n);};})(lista,s.label));
    hdr.appendChild(btn);
    sec.appendChild(hdr);
    lista.forEach(function(c){
      var cps2=c.compras||[];
      var tot=cps2.reduce(function(s,p){return s+Number(String(p.valor||0).replace(',','.'));},0);
      var row=document.createElement('div');
      row.className='client-row';
      row.innerHTML='<div><div class="cname">'+(c.nome||'Sem nome')+'</div>'+
        '<div class="cmeta">'+c.telefone+(c.email?' · '+c.email:'')+'</div></div>'+
        '<div class="cright"><div class="cnum">'+cps2.length+' compra'+(cps2.length!==1?'s':'')+'</div>'+
        '<div class="ctot" style="color:'+s.cor+'">€'+fmtV(tot)+'</div></div>';
      sec.appendChild(row);
    });
    el.appendChild(sec);
  });
}

function exportar(lista, titulo){
  var linhas=['"Nome";"Telefone";"Email";"Pais";"Canal";"Num Compras";"Total EUR";"Ultima Compra"'];
  lista.forEach(function(c){
    var cps2=c.compras||[];
    var tot=cps2.reduce(function(s,p){return s+Number(String(p.valor||0).replace(',','.'));},0);
    var datas=cps2.map(function(p){return p.data||'';}).filter(Boolean).sort();
    linhas.push([c.nome||'',c.telefone||'',c.email||'',c.pais||'',c.canal||'',
      cps2.length,fmtV(tot),datas.length?datas[datas.length-1]:'']
      .map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(';'));
  });
  var NL=String.fromCharCode(13)+String.fromCharCode(10);
  var blob=new Blob([linhas.join(NL)],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=titulo.replace(/[^a-z0-9]/gi,'_')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
</script>
</body>
</html>
