<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raja Pura — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0C0906;--surface:#171210;--surface2:#211A13;--surface3:#2C2218;--gold:#C8913A;--gold-dim:#7A5A1E;--cream:#F0E6D3;--muted:#7A6A55;--muted2:#4A3D2E;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--surface3);padding:0 24px;}
.header-inner{max-width:900px;margin:0 auto;padding:20px 0;display:flex;justify-content:space-between;align-items:center;}
.brand{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--cream);}
.brand-sub{font-size:10px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:2px;}
.conn{font-size:11px;color:var(--muted);}
.main{max-width:900px;margin:0 auto;padding:24px;}
.toolbar{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.search{flex:1;min-width:160px;padding:10px 14px;background:var(--surface);border:1px solid var(--surface3);border-radius:10px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.filt{padding:10px 12px;background:var(--surface);border:1px solid var(--surface3);border-radius:10px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.btn-g{padding:10px 18px;background:var(--gold);border:none;border-radius:10px;color:#0C0906;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;}
.btn-o{padding:10px 16px;background:transparent;border:1px solid var(--gold-dim);border-radius:10px;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.cc{background:var(--surface);border-radius:12px;padding:16px 20px;border:1px solid var(--surface3);cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cc:hover{border-color:var(--gold-dim);}
.cn{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--cream);}
.cp{font-size:12px;color:var(--muted);margin-top:2px;}
.badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.badge{font-size:10px;padding:3px 9px;border-radius:99px;}
.bg{background:rgba(200,145,58,.15);color:var(--gold);}
.bb{background:rgba(90,138,181,.15);color:#7AAAD5;}
.bv{background:rgba(90,158,90,.15);color:#8DC47A;}
.detail{display:none;}
.back{padding:8px 16px;background:transparent;border:1px solid var(--surface3);border-radius:8px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;margin-bottom:20px;}
.dc{background:var(--surface);border-radius:14px;padding:24px;border:1px solid var(--surface3);margin-bottom:16px;}
.dn{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--cream);margin-bottom:4px;}
.dp{font-size:14px;color:var(--muted);margin-bottom:12px;}
.dm{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.da{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.be{padding:9px 18px;background:transparent;border:1px solid var(--gold-dim);border-radius:9px;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.bc{padding:9px 22px;background:var(--gold);border:none;border-radius:9px;color:#0C0906;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;}
.dots{display:flex;gap:6px;margin:8px 0;}
.dot{width:34px;height:7px;border-radius:99px;background:var(--surface3);}
.dot.on{background:var(--gold);}
.ci{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--surface3);}
.ci-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ci-num{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);}
.ci-val{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);}
.ci-meta{font-size:12px;color:var(--muted);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.overlay.open{display:flex;}
.mbox{background:var(--surface);border-radius:18px;padding:28px;width:100%;max-width:520px;border:1px solid var(--gold-dim);margin:auto;}
.mt{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);margin-bottom:20px;}
.fg{margin-bottom:13px;}
.fl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;}
.fi{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--surface3);border-radius:9px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.fi:focus{border-color:var(--gold-dim);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mbtns{display:flex;gap:10px;margin-top:20px;}
.bcan{flex:1;padding:11px;background:transparent;border:1px solid var(--surface3);border-radius:9px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.bsav{flex:2;padding:11px;background:var(--gold);border:none;border-radius:9px;color:#0C0906;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;}
.bdel{padding:11px 14px;background:rgba(196,74,42,.15);border:1px solid rgba(196,74,42,.3);border-radius:9px;color:#E07050;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;}
.cpf{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid var(--surface3);}
.cpf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cpf-n{font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
.brem{padding:3px 10px;background:transparent;border:1px solid rgba(196,74,42,.3);border-radius:6px;color:#E07050;cursor:pointer;font-size:11px;}
.badd{width:100%;padding:10px;background:transparent;border:1px dashed var(--gold-dim);border-radius:9px;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:14px;}
.irow{display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-bottom:7px;}
.badd-i{font-size:11px;padding:4px 10px;background:transparent;border:1px dashed var(--muted2);border-radius:6px;color:var(--muted);cursor:pointer;margin-bottom:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#5A9E5A;color:white;padding:12px 24px;border-radius:99px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);font-style:italic;}
@media(max-width:600px){.frow{grid-template-columns:1fr;}.badges{display:none;}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div><div class="brand-sub">Raja Pura</div><div class="brand">CRM — Clientes</div></div>
    <div class="conn" id="connEl">A ligar...</div>
  </div>
</div>
<div class="main">
  <div id="vLista">
    <div class="toolbar">
      <input class="search" id="sInput" type="text" placeholder="Pesquisar..." oninput="renderLista()">
      <select class="filt" id="fCanalF" onchange="renderLista()">
        <option value="">Todos os canais</option>
        <option value="loja">Loja</option><option value="online">Online</option>
        <option value="instagram">Instagram</option><option value="whatsapp">WhatsApp</option>
        <option value="etsy">Etsy</option>
      </select>
      <button class="btn-g" onclick="openNovo()">+ Novo Cliente</button>
      <button class="btn-o" onclick="exportar()">⬇ Exportar</button>
    </div>
    <div id="cList"></div>
  </div>
  <div id="vDetail" class="detail">
    <button class="back" onclick="goLista()">← Voltar</button>
    <div id="dContent"></div>
  </div>
</div>

<div class="overlay" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="mbox">
    <div class="mt" id="mTitle">Novo Cliente</div>
    <div id="pFields">
      <div class="frow">
        <div class="fg"><label class="fl">Telefone *</label><input class="fi" id="fTel" type="tel" placeholder="+351 9xx xxx xxx"></div>
        <div class="fg"><label class="fl">Nome</label><input class="fi" id="fNome" type="text"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Email</label><input class="fi" id="fEmail" type="email"></div>
        <div class="fg"><label class="fl">País</label><input class="fi" id="fPais" type="text" placeholder="Portugal"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Canal</label>
          <select class="fi" id="fCan"><option value="loja">Loja</option><option value="online">Online</option><option value="instagram">Instagram</option><option value="whatsapp">WhatsApp</option><option value="etsy">Etsy</option></select>
        </div>
        <div class="fg"><label class="fl">Registado por</label>
          <select class="fi" id="fReg"><option>Eduardo</option><option>Zélia</option><option>Catarina</option><option>Joana</option><option>Patrícia</option><option>Vera</option></select>
        </div>
      </div>
      <div class="fg"><label class="fl">Notas</label><input class="fi" id="fNotas" type="text"></div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:14px 0 10px">Compras</div>
      <div id="cpForm"></div>
      <button class="badd" onclick="addCp()">+ Adicionar Compra</button>
    </div>
    <div class="mbtns">
      <button class="bcan" onclick="closeModal()">Cancelar</button>
      <button class="bdel" id="bDel" style="display:none" onclick="delCliente()">Apagar</button>
      <button class="bsav" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var SCRIPT = 'https://script.google.com/macros/s/AKfycbyzemjRA0a2wxMsc-vEKEX2d3gFq2zHjwf7iR4Nc2AbXGelZBoGR9Xn_y359uoP3FFT/exec';
var MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var clientes=[], editId=null, novaCompraId=null, cps=[];

function today(){return new Date().toISOString().split('T')[0];}
function fmt(v){return String(Number(v||0).toFixed(2)).replace('.',',');}
function fmtE(v){return 'EUR '+fmt(v);}
function fmtD(d){if(!d)return'';var p=d.split('-');return p[2]+' '+MESES[parseInt(p[1])-1]+' '+p[0];}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function saveLocal(){try{localStorage.setItem('rp_crm4',JSON.stringify(clientes));}catch(e){}}
function loadLocal(){try{var d=localStorage.getItem('rp_crm4');if(d)clientes=JSON.parse(d);}catch(e){}}

window.onload=function(){
  loadLocal();renderLista();
  fetch(SCRIPT+'?action=get').then(function(r){return r.json();}).then(function(d){
    if(d.clientes){clientes=d.clientes;saveLocal();renderLista();}
    document.getElementById('connEl').textContent='Ligado - '+clientes.length+' clientes';
  }).catch(function(){document.getElementById('connEl').textContent='Offline';});
};

function goLista(){document.getElementById('vLista').style.display='block';document.getElementById('vDetail').style.display='none';renderLista();}
function goDetail(id){document.getElementById('vLista').style.display='none';document.getElementById('vDetail').style.display='block';renderDetail(id);}

function renderLista(){
  var q=(document.getElementById('sInput').value||'').toLowerCase();
  var fc=document.getElementById('fCanalF').value;
  var f=clientes.filter(function(c){
    return(!q||(c.nome||'').toLowerCase().includes(q)||(c.telefone||'').includes(q))&&(!fc||c.canal===fc);
  }).sort(function(a,b){return(a.nome||'').localeCompare(b.nome||'');});
  var el=document.getElementById('cList');
  el.innerHTML='';
  if(!f.length){el.innerHTML='<div class="empty">Sem clientes</div>';return;}
  f.forEach(function(c){
    var nc=(c.compras||[]).length;
    var tot=(c.compras||[]).reduce(function(s,p){return s+Number(p.valor||0);},0);
    var row=document.createElement('div');
    row.className='cc';
    var info=document.createElement('div');
    info.innerHTML='<div class="cn">'+(c.nome||'Sem nome')+'</div><div class="cp">'+
      (c.telefone||'')+(c.pais?' · '+c.pais:'')+'</div>'+
      '<div class="badges" style="margin-top:4px">'+
      '<span class="badge bg">'+nc+' compra'+(nc!==1?'s':'')+'</span>'+
      '<span class="badge bb">'+(c.canal||'loja')+'</span>'+
      (tot>0?'<span class="badge bv">'+fmtE(tot)+'</span>':'')+
      '</div>';
    var btn=document.createElement('button');
    btn.textContent='+ Compra';
    btn.style.cssText='padding:8px 16px;background:var(--gold);border:none;border-radius:8px;color:#0C0906;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;margin-left:12px;flex-shrink:0;';
    btn.addEventListener('click',(function(id){return function(e){e.stopPropagation();openNovaCompra(id);};})(c.id));
    row.appendChild(info);row.appendChild(btn);
    row.addEventListener('click',(function(id){return function(){goDetail(id);};})(c.id));
    el.appendChild(row);
  });
}

function renderDetail(id){
  window._did = id;
  var c = clientes.find(function(x){ return String(x.id) === String(id); });
  if(!c){ goLista(); return; }

  try {
    var cps2 = c.compras || [];
    var tot = cps2.reduce(function(s,p){ return s + Number(String(p.valor||0).replace(',','.')); }, 0);
    var cycle = cps2.length % 5;

    var h = '<div class="dc">';
    h += '<div class="dn">' + (c.nome||'Sem nome') + '</div>';
    h += '<div class="dp">📞 ' + (c.telefone||'—') + '</div>';
    h += '<div class="dm">';
    if(c.email) h += '<span class="badge bb">✉ ' + c.email + '</span>';
    if(c.pais) h += '<span class="badge bg">🌍 ' + c.pais + '</span>';
    if(c.canal) h += '<span class="badge bv">' + c.canal + '</span>';
    if(c.registadoPor) h += '<span class="badge" style="background:var(--surface2);color:var(--muted)">👤 ' + c.registadoPor + '</span>';
    h += '</div>';

    // Progresso
    h += '<div style="margin:12px 0">';
    h += '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px">';
    h += '<span>Progresso desconto 15%</span><span>' + cps2.length + ' compra' + (cps2.length!==1?'s':'') + '</span></div>';
    h += '<div class="dots">';
    for(var i=0; i<5; i++) h += '<div class="dot' + (i<cycle?' on':'') + '"></div>';
    h += '</div>';
    if(cycle===0 && cps2.length>0) h += '<div style="font-size:12px;color:var(--gold);font-weight:600;margin-top:6px">🎉 Desconto 15% conquistado!</div>';
    else if(cycle>0) h += '<div style="font-size:11px;color:var(--muted);margin-top:5px">Faltam ' + (5-cycle) + ' compra' + ((5-cycle)!==1?'s':'') + ' para 15% de desconto</div>';
    h += '</div>';

    if(c.notas) h += '<div style="font-size:13px;color:var(--muted);padding:10px 0;border-top:1px solid var(--surface3)">' + c.notas + '</div>';

    h += '<div style="padding-top:12px;border-top:1px solid var(--surface3);display:flex;justify-content:space-between;align-items:center;margin-top:8px">';
    h += '<span style="font-size:12px;color:var(--muted)">Total gasto</span>';
    h += '<span style="font-family:Cormorant Garamond,serif;font-size:22px;color:var(--gold)">€' + tot.toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</span>';
    h += '</div>';
    h += '<div class="da"><button class="be" onclick="openEditar(window._did)">✏ Editar</button>';
    h += '<button class="bc" onclick="openNovaCompra(window._did)">+ Nova Compra</button></div>';
    h += '</div>';

    // Historico compras
    h += '<div class="dc"><div style="font-family:Cormorant Garamond,serif;font-size:18px;color:var(--cream);margin-bottom:14px">Histórico de Compras</div>';
    if(!cps2.length){
      h += '<div class="empty" style="padding:20px">Sem compras registadas.<br>Clica em "+ Nova Compra".</div>';
    } else {
      var sorted = cps2.slice().reverse();
      sorted.forEach(function(p, i){
        var num = cps2.length - i;
        var vNum = Number(String(p.valor||0).replace(',','.'));
        h += '<div class="ci">';
        h += '<div class="ci-top"><span class="ci-num">Compra #' + num + (num%5===0?' 🎉 15% DESC.':'') + '</span>';
        h += '<span class="ci-val">€' + vNum.toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</span></div>';
        h += '<div class="ci-meta">' + (p.data||'') + (p.canal?' · '+p.canal:'') + (p.registadoPor?' · '+p.registadoPor:'') + '</div>';
        var items = p.items || [];
        if(p.descricao) items = [{descricao: p.descricao}]; // compatibilidade com CRM antigo
        var descs = items.filter(function(it){ return it.descricao||it.referencia; })
          .map(function(it){ return (it.referencia?'['+it.referencia+'] ':'')+it.descricao; });
        if(descs.length) h += '<div style="font-size:12px;color:var(--muted);margin-top:5px">' + descs.join(' · ') + '</div>';
        if(p.obs) h += '<div style="font-size:12px;color:var(--muted);margin-top:4px;font-style:italic">' + p.obs + '</div>';
        h += '</div>';
      });
    }
    h += '</div>';

    document.getElementById('dContent').innerHTML = h;

  } catch(err) {
    document.getElementById('dContent').innerHTML = '<div style="padding:40px;color:#E07050">Erro ao carregar cliente: ' + err.message + '</div>';
    console.error('renderDetail error:', err);
  }
}
